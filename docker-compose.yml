services:
  # ─── Traefik API Gateway ───────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: ocommerce-traefik
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --ping=true
    ports:
      - "80:80"
      - "443:443"
      - "8089:8080"
    volumes:
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./infra/traefik/certs:/etc/traefik/certs:ro

  # ─── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: ocommerce-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ocommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Kafka (Confluent cp-kafka KRaft mode) ───────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: ocommerce-kafka
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "ocommerce-kraft-cluster"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ─── Kafka UI (monitoring) ──────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ocommerce-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: ocommerce
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy

  # ─── Redis (caching) ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ocommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Azurite (Azure Blob Storage emulator) ──────────────────────────────
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: ocommerce-azurite
    ports:
      - "10000:10000"   # Blob
      - "10001:10001"   # Queue
      - "10002:10002"   # Table
    volumes:
      - azurite_data:/data
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 -l /data"

  # ─── Microservices ───────────────────────────────────────────────────────────
  catalog:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE: catalog
    container_name: ocommerce-catalog
    environment:
      PORT: 8081
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ocommerce?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  cart:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE: cart
    container_name: ocommerce-cart
    environment:
      PORT: 8082
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ocommerce?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ordering:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE: ordering
    container_name: ocommerce-ordering
    environment:
      PORT: 8083
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ocommerce?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  inventory:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE: inventory
    container_name: ocommerce-inventory
    environment:
      PORT: 8084
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ocommerce?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  profiles:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE: profiles
    container_name: ocommerce-profiles
    environment:
      PORT: 8085
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  reviews:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE: reviews
    container_name: ocommerce-reviews
    environment:
      PORT: 8086
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ocommerce?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  wishlists:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE: wishlists
    container_name: ocommerce-wishlists
    environment:
      PORT: 8087
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ocommerce?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  coupons:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE: coupons
    container_name: ocommerce-coupons
    environment:
      PORT: 8088
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  kafka_data:
  redis_data:
  azurite_data:
